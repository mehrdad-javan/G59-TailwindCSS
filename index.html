<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <style>
    .btn {
      background-color: #3b82f6; /* blue-500 */
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #2563eb;
    }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
<button class="btn">Click Me</button>
<button class="bg-blue-500 text-white px-4 py-2
               rounded hover:bg-blue-600
               transition-color">Click Me</button>

</body>
</html>
