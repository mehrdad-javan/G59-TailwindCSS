<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid</title>
  <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>

<main class="container mx-auto px-4">

  <div class="grid grid-cols-3 gap-4 bg-white p-4 border-2 border-dashed border-slate-300 rounded-lg">

    <div class="h-16 bg-blue-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-red-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-green-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-yellow-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-gray-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-sky-500 rounded text-white font-bold"></div>

  </div>

  <div class="grid grid-cols-1 gap-4 bg-white p-4 border-2 border-dashed border-slate-300 rounded-lg
              md:grid-cols-3 lg:grid-cols-4">
    <div class="h-16 bg-blue-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-blue-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-blue-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-blue-500 rounded text-white font-bold"></div>

  </div>


  <div class="grid grid-cols-3 gap-4 bg-white p-4 border-2 border-dashed border-slate-300 rounded-lg text-white font-bold">
    <div class="col-span-2 h-16 bg-blue-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-red-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-green-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-yellow-500 rounded text-white font-bold"></div>
    <div class="h-16 bg-gray-500 rounded text-white font-bold"></div>
  </div>




  <div class="grid grid-cols-3 grid-rows-2 gap-4 bg-white p-4 border-2 border-dashed border-slate-300 rounded-lg text-white font-bold h-48">
    <div class="row-span-2 bg-blue-500 rounded text-white font-bold flex item-center justify-center">row-span-2</div>
    <div class="bg-red-500 rounded text-white font-bold">2</div>
    <div class="bg-green-500 rounded text-white font-bold">3</div>
    <div class="bg-yellow-500 rounded text-white font-bold">4</div>
    <div class="bg-gray-500 rounded text-white font-bold">5</div>
  </div>

</main>

</body>
</html>
